version: '3.8'
services:

  postgres:
    image: postgres:15
    container_name: flexibase-auth-postgres
    ports:
      - "${DB_EXPOSE_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${FLEXIBASE_ADMIN_USER:-admin}
      - POSTGRES_PASSWORD=${FLEXIBASE_ADMIN_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-flexibase_auth}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FLEXIBASE_ADMIN_USER:-admin} -d ${DB_NAME:-flexibase_auth}"]
      interval: 5s
      timeout: 5s
      retries: 5

  flexibase-auth:
    build: .
    container_name: flexibase-auth
    ports:
      - "${FLEXIBASE_AUTH_EXPOSE_PORT:-5000}:${FLEXIBASE_AUTH_EXPOSE_PORT:-5000}"
    environment:
      - PORT=${FLEXIBASE_AUTH_EXPOSE_PORT:-5000}
      - DATABASE_URL=postgresql://${FLEXIBASE_ADMIN_USER:-admin}:${FLEXIBASE_ADMIN_PASSWORD:-password}@postgres:5432/${DB_NAME:-flexibase_auth}?schema=public
      - FLEXIBASE_AUTH_SECRET_KEY=${FLEXIBASE_AUTH_SECRET_KEY:-secret}
      - FLEXIBASE_AUTH_REFRESH_SECRET_KEY=${FLEXIBASE_AUTH_REFRESH_SECRET_KEY:-refreshsecret}
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
      
volumes:
  postgres-data:

networks:
  default:
    name: flexibase-auth-network
