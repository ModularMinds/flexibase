version: "3.8"

services:
  # ==========================================
  # DATA STORES
  # ==========================================

  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "${DB_EXPOSE_PORT}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - flexibase-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - flexibase-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - flexibase-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # MICROSERVICES
  # ==========================================

  flexibase-auth:
    build: 
      context: ./flexibase-auth
      dockerfile: Dockerfile
    container_name: flexibase-auth
    ports:
      - "${FLEXIBASE_AUTH_EXPOSE_PORT}:${FLEXIBASE_AUTH_EXPOSE_PORT}"
    environment:
      - PORT=${FLEXIBASE_AUTH_EXPOSE_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - FLEXIBASE_AUTH_SECRET_KEY=${FLEXIBASE_AUTH_SECRET_KEY}
      - FLEXIBASE_AUTH_REFRESH_SECRET_KEY=${FLEXIBASE_AUTH_REFRESH_SECRET_KEY}
      - NODE_ENV=${NODE_ENV}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flexibase-network
    restart: unless-stopped

  flexibase-db:
    build:
      context: ./flexibase-db
      dockerfile: Dockerfile
    container_name: flexibase-db
    ports:
      - "${FLEXIBASE_DB_EXPOSE_PORT}:${FLEXIBASE_DB_EXPOSE_PORT}"
    environment:
      - PORT=${FLEXIBASE_DB_EXPOSE_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - REDIS_URL=${REDIS_URL}
      - NODE_ENV=${NODE_ENV}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      flexibase-auth:
        condition: service_started
    networks:
      - flexibase-network
    restart: unless-stopped

  flexibase-storage:
    build:
      context: ./flexibase-storage
      dockerfile: Dockerfile
    container_name: flexibase-storage
    ports:
      - "${FLEXIBASE_STORAGE_EXPOSE_PORT}:${FLEXIBASE_STORAGE_EXPOSE_PORT}"
    environment:
      - PORT=${FLEXIBASE_STORAGE_EXPOSE_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
      - NODE_ENV=${NODE_ENV}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      flexibase-auth:
        condition: service_started
    networks:
      - flexibase-network
    restart: unless-stopped

  flexibase-mailer:
    build:
      context: ./flexibase-mailer
      dockerfile: Dockerfile
    container_name: flexibase-mailer
    ports:
      - "${FLEXIBASE_MAILER_EXPOSE_PORT}:${FLEXIBASE_MAILER_EXPOSE_PORT}"
    environment:
      - PORT=${FLEXIBASE_MAILER_EXPOSE_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - REDIS_URL=${REDIS_URL}
      - MAIL_PROVIDER=${MAIL_PROVIDER}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_SECURE=${SMTP_SECURE}
      - NODE_ENV=${NODE_ENV}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      flexibase-auth:
        condition: service_started
    networks:
      - flexibase-network
    restart: unless-stopped

  # ==========================================
  # DASHBOARD
  # ==========================================

  flexibase-dashboard:
    build:
      context: ./flexibase-dashboard
      dockerfile: Dockerfile
    container_name: flexibase-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_AUTH_SERVICE_URL=${NEXT_PUBLIC_AUTH_SERVICE_URL}
      - NEXT_PUBLIC_DB_SERVICE_URL=${NEXT_PUBLIC_DB_SERVICE_URL}
      - NEXT_PUBLIC_STORAGE_SERVICE_URL=${NEXT_PUBLIC_STORAGE_SERVICE_URL}
      - NEXT_PUBLIC_MAILER_SERVICE_URL=${NEXT_PUBLIC_MAILER_SERVICE_URL}
      - NODE_ENV=${NODE_ENV}
    command: npm run dev
    volumes:
      - ./flexibase-dashboard:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - flexibase-auth
      - flexibase-db
      - flexibase-storage
      - flexibase-mailer
    networks:
      - flexibase-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  flexibase-network:
    name: flexibase-network
